        }
      }
    ]
  }
  </script>
  <style>
  :root {
    --bg: #090B10;
    --surface: #121622;
    --border: #232A3B;
    --accent: #4DA3FF;
    --text: #F1F5FF;
    --muted: #9AA7C2;
    --glass-border: rgba(255,255,255,0.18);
    --deep-shadow: 0 24px 60px rgba(0,0,0,0.42);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100svh;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 2rem;
    overflow: hidden;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(circle at 12% 12%, rgba(77,163,255,0.12), transparent 40%),
      radial-gradient(circle at 88% 20%, rgba(102,160,255,0.12), transparent 44%),
      linear-gradient(180deg, #090B10 0%, #0F1521 45%, #090D16 100%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.28;
    mask-image: radial-gradient(ellipse 84% 84% at 50% 50%, black, transparent);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: -18% -10%;
    background:
      radial-gradient(closest-side, rgba(77,163,255,0.14), transparent 74%) 16% 24%/42% 42% no-repeat,
      radial-gradient(closest-side, rgba(90,140,255,0.16), transparent 76%) 84% 28%/38% 38% no-repeat,
      radial-gradient(closest-side, rgba(77,163,255,0.08), transparent 78%) 50% 82%/46% 46% no-repeat;
    pointer-events: none;
    filter: blur(36px);
    animation: auroraFloat 24s ease-in-out infinite alternate;
    opacity: 0.8;
  }

  .hero-glow {
    position: fixed;
    width: 620px;
    height: 620px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(77,163,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    animation: glowPulse 7s ease-in-out infinite;
  }

  .container {
    width: min(1040px, 100%);
    text-align: center;
    position: relative;
    padding: clamp(1.3rem, 4vw, 2.2rem) clamp(1.4rem, 5vw, 3.2rem);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    background: linear-gradient(155deg, rgba(22,28,40,0.52), rgba(15,18,26,0.2));
    backdrop-filter: blur(16px) saturate(118%);
    box-shadow: var(--deep-shadow);
    animation: fadeUp 0.6s ease forwards;
    z-index: 2;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    margin-bottom: 1.5rem;
    padding: 0.38rem 0.95rem;
    border-radius: 999px;
    border: 1px solid rgba(77,163,255,0.32);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.5s 0.08s ease forwards;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6CB6FF;
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.8rem, 10vw, 6.8rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 0.95rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.18s ease forwards;
  }

  h1 span {
    -webkit-text-stroke: 1px rgba(77,163,255,0.38);
    color: transparent;
  }

  .question {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.7rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.28s ease forwards;
  }

  .landing-role {
    color: rgba(241,245,255,0.82);
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.7rem, 1.8vw, 0.82rem);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 1.1rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.24s ease forwards;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.9rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.38s ease forwards;
  }

  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    padding: 1.35rem 1.2rem;
    border-radius: 16px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.14);
    background: linear-gradient(160deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    color: var(--text);
    transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s, background 0.22s;
    position: relative;
    overflow: hidden;
  }

  .lang-btn::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: linear-gradient(130deg, rgba(255,255,255,0.2), rgba(255,255,255,0), rgba(77,163,255,0.2));
    opacity: 0;
    transition: opacity 0.22s;
    pointer-events: none;
  }

  .lang-btn:hover {
    transform: translateY(-3px);
    border-color: rgba(77,163,255,0.45);
    box-shadow: 0 12px 26px rgba(77,163,255,0.16);
    background: linear-gradient(160deg, rgba(77,163,255,0.16), rgba(255,255,255,0.03));
  }

  .lang-btn:hover::before {
    opacity: 1;
  }

  .lang-btn .flag { font-size: 1.9rem; }

  .lang-btn .lang-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.18rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .lang-btn .lang-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.11em;
    text-transform: uppercase;
  }

  .lang-btn.primary {
    border-color: rgba(77,163,255,0.5);
    box-shadow: 0 10px 24px rgba(77,163,255,0.2);
  }

  .lang-btn.primary .lang-name { color: #7DBEFF; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes auroraFloat {
    0% { transform: translate3d(0, 0, 0) scale(1); }
    100% { transform: translate3d(0, -20px, 0) scale(1.06); }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.65; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.06); }
  }

  @media (max-width: 640px) {
    body { padding: 1.1rem; }
    .container { border-radius: 16px; padding: 1.15rem 0.9rem; }
    .hero-tag { font-size: 0.58rem; letter-spacing: 0.11em; }
    .question { font-size: 0.72rem; margin-bottom: 1.2rem; }
    .landing-role { font-size: 0.62rem; margin-bottom: 0.9rem; }
    .buttons { grid-template-columns: 1fr; gap: 0.7rem; }
    .lang-btn { padding: 1.05rem 1rem; }
    .lang-btn .lang-name { font-size: 1.05rem; }
  }
  </style>
</head>
<body>
  <div class="hero-glow"></div>
  <div class="container">
    <div class="hero-tag">
      <div class="status-dot"></div>
      Portfolio Entrance
    </div>
    <h1>Sebastian<br/><span>Alejo</span></h1>
    <p class="landing-role">Systems Engineer · IA · Data · E-commerce · Automation</p>
    <p class="question">Choose your language / Elige tu idioma</p>
    <div class="buttons">
      <a href="en.html" class="lang-btn primary">
        <span class="flag">🇺🇸</span>
        <span class="lang-name">English</span>
        <span class="lang-label">Continue in English</span>
      </a>
      <a href="es.html" class="lang-btn">
        <span class="flag">🇵🇪</span>
        <span class="lang-name">Español</span>
        <span class="lang-label">Continuar en español</span>
      </a>
    </div>
  </div>
</body>
