  <script type="application/ld+json">

    "@graph": [
      {

        "jobTitle": "Systems Engineer",
        "sameAs": [
          "https://www.linkedin.com/in/sebastianalejovaldez",

      },
      {

        }

  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(#1e1e2e 1px, transparent 1px),
      linear-gradient(90deg, #1e1e2e 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.3;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(127,255,212,0.07) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    position: relative;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.8s ease forwards;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: #7fffd4;
    letter-spacing: -0.02em;
    margin-bottom: 3.5rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3.2rem, 10vw, 6.5rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 1.2rem;
  }

  h1 span {
    -webkit-text-stroke: 1px rgba(127,255,212,0.4);
    color: transparent;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #6b6b80;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 3.5rem;
  }

  .question {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #6b6b80;
    letter-spacing: 0.08em;
    margin-bottom: 1.5rem;
  }

  .buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    padding: 1.9rem 3.2rem;
    border-radius: 10px;
    text-decoration: none;
    border: 1px solid #1e1e2e;
    background: #13131c;
    color: #e8e8f0;
    transition: all 0.25s;
    min-width: 190px;
  }

  .lang-btn:hover {
    border-color: rgba(127,255,212,0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(127,255,212,0.1);
  }

  .lang-btn .flag { font-size: 2.6rem; }

  .lang-btn .lang-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
  }

  .lang-btn .lang-label {
    font-size: 0.8rem;
    color: #6b6b80;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .lang-btn.primary { border-color: rgba(127,255,212,0.3); }
  .lang-btn.primary .lang-name { color: #7fffd4; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .container { padding: 1.5rem; }
    h1 { font-size: clamp(1.8rem, 11vw, 3rem); margin-bottom: 1rem; }
    .question { font-size: 0.82rem; margin-bottom: 1.2rem; }
    .buttons { flex-direction: column; align-items: center; }
    .lang-btn { min-width: 80%; padding: 1.2rem 1.8rem; }
  }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <h1>Sebastian<br/><span>Alejo</span></h1><br>
    <p class="question">Choose your language / Elige tu idioma</p>
    <div class="buttons">
      <a href="en.html" class="lang-btn primary">
        <span class="flag">🇺🇸</span>
        <span class="lang-name">English</span>
        <span class="lang-label">Continue in English</span>
      </a>
      <a href="es.html" class="lang-btn">
        <span class="flag">🇵🇪</span>
        <span class="lang-name">Español</span>
        <span class="lang-label">Continuar en español</span>
      </a>
    </div>
  </div>
</body>
</html>
